<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>THR Ramadan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-success">
  <div class="container">
    <span class="navbar-brand">Ramadan THR 🎁</span>
  </div>
</nav>

<!-- Main -->
<div class="container text-center mt-5">

  <h1 class="display-4 text-warning">🌙 Selamat Berbuka</h1>
  <p class="lead">Klik tombol di bawah untuk kejutan spesial</p>

  <!-- BUTTON THR -->
  <button class="btn btn-warning btn-lg mt-3"
          data-bs-toggle="modal"
          data-bs-target="#thrModal">
    Klaim THR 💸
  </button>

</div>

<!-- MODAL -->
<div class="modal fade" id="thrModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center">

      <div class="modal-header bg-success text-light">
        <h5 class="modal-title">🎉 Selamat!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <h3 class="text-success">💰 Anda mendapatkan THR!</h3>
        <p class="text-warning"> Semoga berkah dan tidak langsung habis ya 😏</p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-success" data-bs-dismiss="modal">
          Ambil THR
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-success text-center text-light mt-5 p-3">
  <p class="mb-0">© 2026 THR Project - Faqih Abdullah</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
