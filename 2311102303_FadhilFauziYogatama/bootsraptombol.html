<!DOCTYPE html>
<html>
<head>
  <title>THR Ramadan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-center text-white">

<div class="container mt-5">
  <h1>🌙 Ramadan Kareem</h1>

  <button class="btn btn-warning btn-lg mt-3" data-bs-toggle="modal" data-bs-target="#thrModal">
    🎁 Cairin THR
  </button>
</div>

<!-- Modal -->
<div class="modal fade" id="thrModal">
  <div class="modal-dialog">
    <div class="modal-content text-center">

      <div class="modal-header">
        <h5 class="modal-title">🎉 Selamat!</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <h3>💸 Selamat, Anda mendapatkan THR!</h3>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
